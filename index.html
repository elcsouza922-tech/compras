<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Compras Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #10b981;
      --bg: #f1f5f9;
      --card: rgba(255, 255, 255, 0.9);
      --text: #1e293b;
      --text-light: #64748b;
      --danger: #ef4444;
    }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0; padding: 20px;
      color: var(--text);
      touch-action: pan-y;
      padding-bottom: 140px;
      min-height: 100vh;
    }

    body::before {
      content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #e0f2fe 0%, #dcfce7 100%);
      z-index: -1;
    }

    .container { position: relative; z-index: 10; max-width: 500px; margin: auto; }

    /* LOGIN */
    .login-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(10px);
      z-index: 5000; display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: var(--card); padding: 40px 30px; border-radius: 28px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); width: 90%; max-width: 360px; text-align: center;
    }

    /* HEADER */
    .header-app { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .btn-sair { background: white; border: 1px solid #e2e8f0; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; color: var(--text-light); cursor: pointer; }

    /* INPUT SECTION */
    .input-section { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); margin-bottom: 20px; }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 16px; box-sizing: border-box; margin-bottom: 10px; font-family: inherit;
    }
    .btn-add { background: var(--primary); color: white; width: 100%; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .btn-add:active { transform: scale(0.98); }

    /* LISTA */
   /* LISTA - AJUSTADO PARA NÃO APARECER O FUNDO VERMELHO */
    .item-wrapper { 
      position: relative; 
      overflow: hidden; 
      border-radius: 16px; 
      margin-bottom: 8px; 
      background: var(--danger); /* O vermelho fica aqui, escondido */
    }
    
    li {
      display: flex; 
      align-items: center; 
      gap: 12px; 
      padding: 14px; 
      list-style: none;
      background: white; /* Fundo sólido para cobrir o vermelho */
      position: relative; 
      z-index: 2; 
      transition: transform 0.2s, background 0.3s;
    }

    /* ESTILO QUANDO COMPRADO - SEM TRANSPARÊNCIA NO FUNDO */
    li.comprado { 
      background: #f1f5f9; /* Um cinza bem claro em vez de ficar transparente */
    }

    li.comprado .nome { 
      text-decoration: line-through; 
      color: var(--text-light); 
    }

    li.comprado input[type="checkbox"] {
      opacity: 0.5; /* Só o checkbox fica mais clarinho */
    }

    li.comprado .qtd, li.comprado .preco {
      opacity: 0.7; /* Os valores ficam mais discretos */
    }
    /* FOOTER & ACTIONS */
    .total-card { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 20px; text-align: center; border-top: 1px solid #e2e8f0; z-index: 100; }
    .btn-limpar { background: none; border: none; color: var(--danger); font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 10px; text-decoration: underline; opacity: 0.7; }

    #toast, .undo { position: fixed; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 25px; border-radius: 50px; z-index: 9999; display: none; }
    #toast { top: 20px; }
    .undo { bottom: 110px; align-items: center; gap: 10px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="toast">Item adicionado!</div>

<div id="login-screen" class="login-overlay">
    <div class="login-box">
        <div style="font-size: 40px; margin-bottom: 10px;">🔐</div>
        <h2>Acesso Vip</h2>
        <input type="email" id="login-email" placeholder="E-mail">
        <input type="password" id="login-pass" placeholder="Senha">
        <button class="btn-add" onclick="fazerLogin()">Entrar</button>
        <p id="login-erro" style="color:red; font-size:12px; margin-top:10px;"></p>
    </div>
</div>

<div id="app-content" class="container hidden">
  <div class="header-app">
      <h2 style="margin: 0;">🛒 Minha Lista</h2>
      <button class="btn-sair" onclick="logout()">Sair</button>
  </div>

  <div class="input-section">
    <input type="text" id="item" placeholder="O que vamos comprar?">
    <button class="btn-add" onclick="adicionarItem()">Adicionar Item</button>
    <center><button class="btn-limpar" onclick="limparLista()">Limpar Tudo</button></center>
  </div>
  
  <div id="lista"></div>
</div>

<div class="total-card">
    <div style="font-size: 11px; color: var(--text-light); font-weight: bold;">TOTAL COMPRADO</div>
    <div style="font-size: 26px; font-weight: 800; color: var(--primary);">R$ <span id="total">0.00</span></div>
</div>

<div id="undo" class="undo">
  <span>Removido</span>
  <button onclick="desfazer()" style="background:var(--primary); border:none; color:white; padding:4px 8px; border-radius:6px; cursor:pointer;">Desfazer</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBK3e1x0ZgjZEjHgrJy33jpDl30y2QUww0",
  databaseURL: "https://listacompras-70e30-default-rtdb.firebaseio.com",
  projectId: "listacompras-70e30",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let lista = [];
let listaRef;
let ultimoRemovido = null;

// LOGIN
window.fazerLogin = () => {
    const email = document.getElementById('login-email').value;
    const pass = document.getElementById('login-pass').value;
    signInWithEmailAndPassword(auth, email, pass).catch(e => {
        document.getElementById('login-erro').innerText = "Credenciais inválidas";
    });
};

window.logout = () => { if(confirm("Sair do app?")) signOut(auth); };

onAuthStateChanged(auth, (user) => {
    if (user) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app-content').classList.remove('hidden');
        listaRef = ref(db, 'usuarios/' + user.uid + '/lista');
        onValue(listaRef, (snapshot) => {
            lista = snapshot.val() || [];
            renderizar();
        });
    } else {
        document.getElementById('login-screen').classList.remove('hidden');
        document.getElementById('app-content').classList.add('hidden');
    }
});

function salvar() { if (auth.currentUser) set(listaRef, lista); }

window.adicionarItem = () => {
    const input = document.getElementById('item');
    if (!input.value.trim()) return;
    lista.push({ nome: input.value.trim(), comprado: false, preco: '', qtd: 1 });
    input.value = '';
    salvar();
    const t = document.getElementById('toast');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
};

window.toggle = (idx) => { lista[idx].comprado = !lista[idx].comprado; salvar(); };

window.setPreco = (idx, valor) => {
    lista[idx].preco = valor;
    salvar();
    atualizarTotal();
};

window.setQtd = (idx, valor) => { lista[idx].qtd = parseInt(valor) || 1; salvar(); };

window.removerItem = (idx) => {
    ultimoRemovido = { item: lista[idx], index: idx };
    lista.splice(idx, 1);
    salvar();
    const undo = document.getElementById('undo');
    undo.style.display = 'flex';
    setTimeout(() => undo.style.display = 'none', 5000);
};

window.desfazer = () => {
    if (!ultimoRemovido) return;
    lista.splice(ultimoRemovido.index, 0, ultimoRemovido.item);
    salvar();
    document.getElementById('undo').style.display = 'none';
};

window.limparLista = () => {
    if (confirm("Apagar todos os itens da lista?")) {
        lista = [];
        salvar();
    }
};

function renderizar() {
    const container = document.getElementById('lista');
    container.innerHTML = '';

    const pendentes = lista.filter(i => !i.comprado).sort((a,b) => a.nome.localeCompare(b.nome));
    const comprados = lista.filter(i => i.comprado).sort((a,b) => a.nome.localeCompare(b.nome));
    const ordenada = [...pendentes, ...comprados];

    ordenada.forEach(item => {
        const idx = lista.indexOf(item);
        const wrapper = document.createElement('div');
        wrapper.className = 'item-wrapper';
        wrapper.innerHTML = `
            <div class="fundo-delete">Excluir</div>
            <li class="${item.comprado ? 'comprado' : ''}">
                <input type="checkbox" ${item.comprado ? 'checked' : ''} onchange="toggle(${idx})">
                <span class="nome">${item.nome}</span>
                <input type="number" value="${item.qtd || 1}" class="qtd" onchange="setQtd(${idx}, this.value)">
                <input type="text" placeholder="R$" value="${item.preco || ''}" class="preco" oninput="setPreco(${idx}, this.value)">
            </li>
        `;
        configurarSwipe(wrapper.querySelector('li'), idx);
        container.appendChild(wrapper);
    });
    atualizarTotal();
}

function configurarSwipe(li, index) {
    let startX = 0, currentX = 0, movendo = false;
    li.addEventListener('touchstart', e => { startX = e.touches[0].clientX; movendo = false; }, {passive: true});
    li.addEventListener('touchmove', e => {
        currentX = e.touches[0].clientX;
        let diff = currentX - startX;
        if (Math.abs(diff) > 10) movendo = true;
        if (diff < 0) li.style.transform = `translateX(${diff}px)`;
    }, {passive: true});
    li.addEventListener('touchend', () => {
        let diff = currentX - startX;
        if (movendo && diff < -120) {
            li.style.transform = 'translateX(-100%)';
            setTimeout(() => window.removerItem(index), 200);
        } else { li.style.transform = 'translateX(0)'; }
    });
}

function atualizarTotal() {
    let total = 0;
    lista.forEach(i => {
        if(i.comprado) {
            const p = parseFloat(i.preco.toString().replace(',', '.')) || 0;
            total += p * (i.qtd || 1);
        }
    });
    document.getElementById('total').innerText = total.toFixed(2);
}

document.getElementById('item').addEventListener('keypress', (e) => { if(e.key === 'Enter') window.adicionarItem(); });
</script>
</body>
</html>
