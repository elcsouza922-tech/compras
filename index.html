<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Compras</title>
  <style>
    body { font-family: Arial; padding: 10px; background: #f5f5f5; }
    .container { max-width: 500px; margin: auto; background: white; padding: 10px; border-radius: 10px; }

    input, select, button { width: 100%; padding: 10px; margin: 5px 0; }

    li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-bottom: 1px solid #eee;
      white-space: nowrap;
    }

    .nome {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .qtd, .preco { width: 60px; }

    .undo {
      position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
      background: black; color: white; padding: 10px; display: none;
    }

    .secao { margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <h3>Lista</h3>

  <input id="item" placeholder="Item">
  <select id="categoria">
    <option>Hortifruti</option>
    <option>Açougue</option>
    <option>Padaria</option>
    <option>Bebidas</option>
    <option>Limpeza</option>
    <option>Higiene</option>
    <option>Outros</option>
  </select>
  <button onclick="add()">Adicionar</button>

  <button onclick="finalizarCompra()">Finalizar compra</button>
  <button onclick="repetirUltima()">Repetir última compra</button>

  <div id="lista"></div>
</div>

<div id="undo" class="undo">
  Removido <button onclick="undo()">Desfazer</button>
</div>

<script>
let lista = JSON.parse(localStorage.getItem('lista')) || [];
let historico = JSON.parse(localStorage.getItem('historico')) || [];
let ultimoRemovido = null;

function salvar(){
  localStorage.setItem('lista', JSON.stringify(lista));
}

function render(){
  const div = document.getElementById('lista');
  div.innerHTML = '';

  const categorias = {};
  lista.forEach(i=>{
    if(!categorias[i.categoria]) categorias[i.categoria]=[];
    categorias[i.categoria].push(i);
  });

  Object.keys(categorias).sort().forEach(cat=>{
    const t = document.createElement('div');
    t.className='secao';
    t.innerText=cat;
    div.appendChild(t);

    categorias[cat].sort((a,b)=>a.nome.localeCompare(b.nome)).forEach(item=>{
      const i = lista.indexOf(item);
      const li = document.createElement('li');

      li.innerHTML = `
        <input type="checkbox" ${item.ok?'checked':''} onchange="toggle(${i})">
        <span class="nome">${item.nome}</span>
        <input class="qtd" type="number" value="${item.qtd}" onchange="setQtd(${i},this.value)">
        <input class="preco" type="text" value="${item.preco}" oninput="setPreco(${i},this.value)">
      `;

      // swipe
      let sx=0, cx=0;
      li.ontouchstart=e=>sx=e.touches[0].clientX;
      li.ontouchmove=e=>{
        cx=e.touches[0].clientX;
        let d=cx-sx;
        if(d<0) li.style.transform=`translateX(${d}px)`;
      };
      li.ontouchend=()=>{
        if(cx-sx<-100) remove(i);
        else li.style.transform='translateX(0)';
      };

      div.appendChild(li);
    });
  });
}

function add(){
  const nome = item.value;
  if(!nome) return;
  lista.push({nome, categoria:categoria.value, qtd:1, preco:'', ok:false});
  item.value='';
  salvar(); render();
}

function toggle(i){ lista[i].ok=!lista[i].ok; salvar(); }
function setQtd(i,v){ lista[i].qtd=v; salvar(); }
function setPreco(i,v){ lista[i].preco=v; salvar(); }

function remove(i){
  ultimoRemovido = lista[i];
  lista.splice(i,1);
  salvar(); render();
  undo.style.display='block';
  setTimeout(()=>undo.style.display='none',4000);
}

function undo(){
  if(!ultimoRemovido) return;
  lista.push(ultimoRemovido);
  salvar(); render();
  undo.style.display='none';
}

// histórico
function finalizarCompra(){
  historico.push({data:new Date().toLocaleString(), itens:lista});
  localStorage.setItem('historico', JSON.stringify(historico));
  lista=[];
  salvar(); render();
}

function repetirUltima(){
  if(historico.length===0) return;
  lista = [...historico[historico.length-1].itens];
  salvar(); render();
}

render();
</script>

</body>
</html>
